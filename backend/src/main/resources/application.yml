server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: fan-iot-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fan_iot_platform}
    username: ${SPRING_DATASOURCE_USERNAME:fan_iot}
    password: ${SPRING_DATASOURCE_PASSWORD:please_change_me}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  jwt:
    secret: ${JWT_SECRET:please_change_to_a_long_random_secret_at_least_32_chars}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  admin:
    username: ${ADMIN_USERNAME:}
    password: ${ADMIN_PASSWORD:}
    real-name: ${ADMIN_REAL_NAME:System Administrator}
  mqtt:
    enabled: ${MQTT_ENABLED:true}
    broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
    client-id: ${MQTT_CLIENT_ID:fan-iot-platform-backend}
    username: ${MQTT_USERNAME:}
    password: ${MQTT_PASSWORD:}
    telemetry-topic: ${MQTT_TELEMETRY_TOPIC:iot/d200/+/up}
  communication:
    offline-timeout-seconds: ${COMMUNICATION_OFFLINE_TIMEOUT_SECONDS:180}
    status-check-interval-ms: ${COMMUNICATION_STATUS_CHECK_INTERVAL_MS:30000}
  lbs:
    enabled: ${LBS_ENABLED:false}
    provider: ${LBS_PROVIDER:cellocation}
    base-url: ${LBS_BASE_URL:http://api.cellocation.com:84/cell/}
    api-key: ${LBS_API_KEY:}
    default-mcc: ${LBS_DEFAULT_MCC:460}
    default-mnc: ${LBS_DEFAULT_MNC:}
    network: ${LBS_NETWORK:GSM}
    signal: ${LBS_SIGNAL:-99}
    connect-timeout-seconds: ${LBS_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${LBS_READ_TIMEOUT_SECONDS:8}

logging:
  level:
    root: info
    com.faniot.platform: debug
