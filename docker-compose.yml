services:
  frontend:
    build:
      context: ./frontend
    container_name: fan-iot-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"

  backend:
    build:
      context: ./backend
    container_name: fan-iot-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: ${SERVER_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_REAL_NAME: ${ADMIN_REAL_NAME}
      MQTT_ENABLED: "true"
      MQTT_BROKER_URL: tcp://mqtt:1883
      MQTT_CLIENT_ID: fan-iot-platform-backend
      MQTT_TELEMETRY_TOPIC: iot/d200/+/up
      MQTT_BROKER_LOG_PATH: /var/log/fan-iot-mqtt/mosquitto.log
      LBS_ENABLED: ${LBS_ENABLED:-false}
      LBS_PROVIDER: ${LBS_PROVIDER:-cellocation}
      LBS_BASE_URL: ${LBS_BASE_URL:-http://api.cellocation.com:84/cell/}
      LBS_API_KEY: ${LBS_API_KEY:-}
      LBS_DEFAULT_MCC: ${LBS_DEFAULT_MCC:-460}
      LBS_DEFAULT_MNC: ${LBS_DEFAULT_MNC:-3}
      LBS_NETWORK: ${LBS_NETWORK:-GSM}
      LBS_SIGNAL: ${LBS_SIGNAL:--99}
      TZ: ${TZ}
    ports:
      - "${SERVER_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_started
    volumes:
      - mqtt_log:/var/log/fan-iot-mqtt:ro

  postgres:
    image: postgres:16-alpine
    container_name: fan-iot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fan-iot-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: fan-iot-mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT}:1883"
      - "${MQTT_WS_PORT}:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log

volumes:
  postgres_data:
  redis_data:
  mqtt_data:
  mqtt_log:
